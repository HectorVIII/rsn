    robot_ip: "192.168.1.225"

    speed: 100.0
    acc: 200.0
    wait_for_finish: true

    p0: [452.3, 0.0, 75.6, 180.0, 0.0, 0.0]  # Idle pose, 6D pose list: [x, y, z, roll, pitch, yaw] mm and degree
